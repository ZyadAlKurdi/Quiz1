<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار الشامل - مادة كرة القدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --secondary: #2c3e50; --wrong: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-container { background: white; width: 95%; max-width: 650px; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--secondary); margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 15px; background: #f8f9fa; padding: 10px 15px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        .question { font-size: 19px; margin-bottom: 20px; color: var(--secondary); line-height: 1.6; font-weight: 700; min-height: 50px; }
        .options { display: grid; gap: 10px; }
        button.option { padding: 14px; border: 2px solid #edeff0; border-radius: 10px; background: white; cursor: pointer; transition: 0.2s; font-family: 'Tajawal', sans-serif; font-size: 16px; text-align: right; color: #333; }
        button.option:hover:not([disabled]) { border-color: var(--primary); background: #fafafa; }
        button.correct { background-color: var(--primary) !important; color: white; border-color: #219150; }
        button.wrong { background-color: var(--wrong) !important; color: white; border-color: #c0392b; }
        .result-screen { text-align: center; display: none; }
        .final-box { background: #f8f9fa; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #ddd; }
        .stat-line { font-size: 18px; margin: 10px 0; display: flex; justify-content: space-between; padding: 5px 20px; }
        .correct-text { color: var(--primary); font-weight: bold; }
        .wrong-text { color: var(--wrong); font-weight: bold; }
        .dua { font-size: 24px; color: #2980b9; font-weight: bold; margin: 30px 0; line-height: 1.6; }
        .restart-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="game">
        <h1>اختبار كرة القدم - مرحلة الثالثة - زياد طارق عزيز</h1>
        <div class="stats-bar">
            <span>سؤال: <span id="current-idx">1</span> / <span id="total-q-count">--</span></span>
            <span style="color: green;">الصح: <span id="live-score">0</span></span>
        </div>
        <div class="question" id="question-text">جاري التحميل...</div>
        <div class="options" id="options-container"></div>
    </div>

    <div class="result-screen" id="result">
        <h1>النتيجة النهائية</h1>
        <div class="final-box">
            <div class="stat-line"><span>عدد الإجابات الصحيحة:</span> <span class="correct-text" id="final-correct">0</span></div>
            <div class="stat-line"><span>عدد الإجابات الخاطئة:</span> <span class="wrong-text" id="final-wrong">0</span></div>
            <div class="stat-line" style="border-top: 2px solid #ddd; padding-top: 10px; margin-top: 10px;">
                <span>النسبة المئوية:</span> <span id="final-percent">0%</span>
            </div>
        </div>
        <div class="dua">اللهم ارزقنا النجاح والتوفيق والدرجات العلى في الدنيا والآخرة.. اللهم آمين</div>
        <button class="restart-btn" onclick="location.reload()">إعادة الاختبار 🔄</button>
    </div>
</div>

<script>
    const quizData = [
        // --- قسم الدفاع الحديث (1-30) ---
        { q: "من أهم واجبات الدفاع الصحيح الحديث هو:", a: ["زيادة الهجوم فقط", "إيقاف المهاجم الخصم تكاسيفياً بدافعية", "ترك المساحات للمنافس", "اللعب الفردي فقط"], c: 1 },
        { q: "تأخير تصاعد نمو الهجمة للفريق الخصم يعني:", a: ["تسريع هجوم الخصم", "إبطاء تقدم الهجمة المنافسة", "ترك الكرة للمنافس", "عدم الرجوع للدفاع"], c: 1 },
        { q: "السعي للحصول على الوقت للرجوع إلى مناطقنا الدفاعية يهدف إلى:", a: ["زيادة الهجوم", "تنظيم الخط الدفاعي", "تغيير الحارس", "إضاعة الوقت فقط"], c: 1 },
        { q: "تقليل الفراغ والوقت على المنافس على بعد 40 ياردة من الهدف يسمى:", a: ["هجوم مرتد", "ضغط دفاعي", "تمرير جانبي", "لعب حر"], c: 1 },
        { q: "عمل الارتكازات السريعة الخلفية في المناطق خلف دفاعنا يهدف إلى:", a: ["زيادة الأهداف", "حماية العمق الدفاعي", "تبديل اللاعبين", "تنفيذ ركنية"], c: 1 },
        { q: "التغطية الجيدة والمتبادلة والافتضاض المناسب تعني:", a: ["ترك الخصم بحرية", "تعاون دفاعي منظم", "إيقاف اللعب", "اللعب الفردي"], c: 1 },
        { q: "السعي للحصول على الزيادة العددية في الدفاع 2 ضد 1 يسمى:", a: ["هجوم سريع", "تفوق عددي دفاعي", "ضغط هجومي", "استحواذ فقط"], c: 1 },
        { q: "كسب حالة الصراع الفردي 1 ضد 1 لصالح فريقنا يعني:", a: ["ترك اللاعب المنافس", "النجاح في المواجهة الفردية الدفاعية", "لعب هجومي", "إضاعة الوقت"], c: 1 },
        { q: "الضغط على الخصم ومنعه من التمريرات الأمامية يهدف إلى:", a: ["تسهيل هجومه", "منعه من الوصول لمرمانا بسهولة", "إعطاؤه فرصة للتسجيل", "تقليل الاستحواذ فقط"], c: 1 },
        { q: "المراقبة الجيدة وقطع الكرة وتوفير العمق الدفاعي تهدف إلى:", a: ["زيادة الركنيات", "حماية المنطقة الخطيرة المهددة لمرمانا", "زيادة الهجوم", "تنفيذ ضربات حرة"], c: 1 },
        { q: "من أهداف الدفاع الصحيح أيضاً:", a: ["ترك المنافس يتحرك بحرية", "تقليل فرص التسجيل على الفريق الخصم", "عدم العودة للخلف", "الاعتماد على الحارس فقط"], c: 1 },
        { q: "عند الضغط على المنافس يجب:", a: ["منحه الوقت والمساحة", "تقليل الوقت والمساحة المتاحة له", "تركه يمر بسهولة", "الابتعاد عنه تماماً"], c: 1 },
        { q: "التغطية الدفاعية الجيدة تساعد على:", a: ["زيادة الأخطاء الدفاعية", "دعم الزميل المدافع وتقليل الخطورة", "ترك المساحات للمنافس", "إضعاف الدفاع"], c: 1 },
        { q: "الزيادة العددية الدفاعية تعني:", a: ["زيادة عدد المهاجمين", "وجود أكثر من مدافع ضد مهاجم واحد", "خروج المدافعين من أماكنهم", "تقليل عدد اللاعبين"], c: 1 },
        { q: "في الدفاع الحديث يجب التركيز على:", a: ["المهارات الفردية فقط", "التعاون الجماعي والتنظيم الدفاعي", "اللعب العشوائي", "ترك الكرة للمنافس"], c: 1 },
        { q: "الهدف من إبطاء هجمة المنافس هو:", a: ["إعطاؤه فرصة أفضل", "منح الفريق وقتاً للعودة وتنظيم الدفاع", "زيادة سرعة المباراة", "تقليل عدد اللاعبين"], c: 1 },
        { q: "المراقبة الفردية للاعب المنافس تهدف إلى:", a: ["تسهيل تحركاته", "الحد من خطورته ومنعه من الاستلام بحرية", "تركه دون رقابة", "زيادة الاستحواذ"], c: 1 },
        { q: "غلق العمق الدفاعي يعني:", a: ["ترك المساحات خلف الدفاع", "حماية المنطقة القريبة من المرمى", "زيادة الهجوم", "التقدم الكامل للأمام"], c: 1 },
        { q: "المواجهة الفردية الناجحة 1 ضد 1 تؤدي إلى:", a: ["زيادة فرص الخصم", "استعادة الكرة وتقليل الخطورة", "ضعف الدفاع", "إيقاف المباراة"], c: 1 },
        { q: "الدفاع المنظم يعتمد على:", a: ["العشوائية", "التمركز الصحيح والتغطية المستمرة", "اللعب الفردي فقط", "الهجوم فقط"], c: 1 },
        { q: "من واجبات المدافع الأساسية:", a: ["ترك المهاجم دون رقابة", "مراقبة المهاجم ومنعه من التقدم", "الوقوف فقط", "اللعب الهجومي فقط"], c: 1 },
        { q: "الضغط الدفاعي الفعال يؤدي إلى:", a: ["راحة المهاجم", "إجبار المنافس على ارتكاب الأخطاء", "تسهيل التمرير للمنافس", "زيادة خطورة الخصم"], c: 1 },
        { q: "من وسائل الدفاع الجيد:", a: ["االبتعاد عن الكرة", "قطع التمريرات ومراقبة المنافس", "ترك المساحات", "الوقوف دون حركة"], c: 1 },
        { q: "الهدف من التغطية الدفاعية هو:", a: ["ترك الزميل وحده", "مساندة المدافع الأساسي عند الحاجة", "تقليل عدد المدافعين", "إيقاف الهجوم فقط"], c: 1 },
        { q: "عند وجود مهاجم خطير قرب المرمى يجب:", a: ["تركه بحرية", "مراقبته بإحكام وتقليل فرصه", "الابتعاد عنه", "السماح له بالتصويب"], c: 1 },
        { q: "الدفاع الجماعي يعتمد على:", a: ["العمل الفردي فقط", "التعاون بين جميع اللاعبين", "الحارس فقط", "المهاجمين فقط"], c: 1 },
        { q: "منع التمريرات الأمامية للمنافس يساعد في:", a: ["تسريع هجومه", "إبطاء بناء الهجمة الهجومية", "زيادة الأهداف عليه", "ترك المساحات"], c: 1 },
        { q: "من صفات المدافع الجيد:", a: ["البطء وعدم التركيز", "السرعة والتركيز وحسن التمركز", "ترك الخصم بحرية", "اللعب العشوائي"], c: 1 },
        { q: "الدفاع الناجح يبدأ من:", a: ["الحارس فقط", "جميع خطوط الفريق", "المهاجمين فقط", "المدافعين فقط دون الوسط"], c: 1 },
        { q: "الهدف النهائي من الدفاع هو:", a: ["زيادة عدد الركنيات", "حماية المرمى ومنع استقبال الأهداف", "الاحتفاظ بالكرة فقط", "إضاعة الوقت"], c: 1 },

        // --- قسم الضغط (1-30 الجديدة) ---
        { q: "ما المقصود بالضغط بكرة القدم؟", a: ["التراجع الكامل للدفاع", "محاولة منع الفريق المنافس من حيازة الكرة", "اللعب الفردي فقط", "الاعتماد على الحارس"], c: 1 },
        { q: "من أهداف الضغط:", a: ["إبطاء هجوم الفريق المنافس", "زيادة أخطاء الفريق المدافع", "تقليل عدد اللاعبين", "إضاعة الوقت فقط"], c: 0 },
        { q: "من شروط نجاح الضغط:", a: ["ضعف اللياقة البدنية", "امتلاك عقلية ناجحة للهجوم على المنافس", "الاعتماد على لاعب واحد", "الوقوف الثابت"], c: 1 },
        { q: "يستخدم الضغط عندما:", a: ["يرغب فريقنا اللعب بسرعة كبيرة", "يكون الفريق متفوقاً جداً", "لا توجد كرة", "عند انتهاء المباراة"], c: 0 },
        { q: "من الملاحظات التدريبية للاعب الضاغط:", a: ["ترك المنافس يتحرك بحرية", "الضغط من مسافة بعيدة", "التحرك على الكرة وتحويلها نحو المرمى", "عدم متابعة الكرة"], c: 2 },
        { q: "عندما يكون المنافس ضعيف السيطرة على الكرة يجب:", a: ["التراجع فقط", "الضغط واعتراض الكرة", "تركه يمر", "الوقوف دون حركة"], c: 1 },
        { q: "من أنواع الضغط في كرة القدم:", a: ["الضغط الفردي", "الضغط الجماعي", "الضغط في نصف ملعب الخصم", "جميع ما ذكر"], c: 3 },
        { q: "الضغط الجماعي يعني:", a: ["لاعب واحد يضغط", "تعاون أكثر من لاعب لاستعادة الكرة", "الحارس يضغط", "عدم التحرك"], c: 1 },
        { q: "من فوائد الضغط الناجح:", a: ["فقدان الكرة بسرعة", "استعادة الكرة في مناطق متقدمة", "تقليل فرص التسجيل", "زيادة أخطاء الفريق"], c: 1 },
        { q: "الضغط في نصف ملعب الخصم يساعد على:", a: ["إبعاد الفريق عن الهجوم", "منع المنافس من بناء الهجمة", "تقليل عدد اللاعبين", "سرعة المباراة"], c: 1 },
        { q: "العامل الأساسي في تنفيذ الضغط هو:", a: ["البطء", "السرعة والتوقيت المناسب", "الوقوف", "الحظ"], c: 1 },
        { q: "إذا نجح الضغط فإن الفريق يستطيع:", a: ["خسارة المباراة", "السيطرة على مجريات اللعب", "تقليل الهجوم", "زيادة الأخطاء"], c: 1 },
        { q: "من أخطاء الضغط:", a: ["التأخر في الانقضاض", "الاقتراب السريع", "التعاون", "التغطية"], c: 0 },
        { q: "اللاعب الضاغط يجب أن يكون:", a: ["بطيئاً", "متردداً", "شجاعاً وسريع القرار", "بعيداً"], c: 2 },
        { q: "الهدف الرئيسي من الضغط هو:", a: ["استرجاع الكرة بسرعة", "إضاعة الوقت", "زيادة اللاعبين", "تغيير الحكم"], c: 0 },
        { q: "الضغط الناجح يتطلب:", a: ["التنسيق بين اللاعبين", "اللعب العشوائي", "الوقوف", "لاعب واحد فقط"], c: 0 },
        { q: "عند الضغط على حامل الكرة يجب:", a: ["منحه مساحة", "غلق زوايا التمرير عليه", "الابتعاد", "انتظار الخطأ"], c: 1 },
        { q: "الضغط المبكر يساعد على:", a: ["بناء هجمة للمنافس", "تقليل خطورة المنافس", "ضعف الدفاع", "زيادة المساحات"], c: 1 },
        { q: "من صفات الفريق الجيد في الضغط:", a: ["البطء", "التنظيم والانضباط", "الفوضى", "الصدفة"], c: 1 },
        { q: "الضغط بعد فقدان الكرة يسمى:", a: ["الضغط العكسي", "الدفاع السلبي", "اللعب الفردي", "التراجع النهائي"], c: 0 },
        { q: "من فوائد الضغط العكسي:", a: ["استعادة الكرة بسرعة بعد فقدانها", "إيقاف المباراة", "تقليل اللاعبين", "إراحة الخصم"], c: 0 },
        { q: "عند فشل الضغط الأول يجب:", a: ["الاستسلام", "وجود تغطية من الزملاء", "ترك المنافس يسجل", "التوقف"], c: 1 },
        { q: "الضغط الفعال يبدأ من:", a: ["التنظيم الجماعي للفريق", "الحارس", "المدرب", "الجمهور"], c: 0 },
        { q: "من عناصر نجاح الضغط:", a: ["التواصل بين اللاعبين", "اللعب الفردي", "البطء", "ترك المساحات"], c: 0 },
        { q: "الضغط العالي يعني:", a: ["الضغط بالقرب من مرمى المنافس", "الضغط في منطقة الجزاء فقط", "التراجع", "عدم التحرك"], c: 0 },
        { q: "الضغط المتوسط يكون غالباً في:", a: ["وسط الملعب", "داخل المرمى", "خارج الملعب", "خط التماس"], c: 0 },
        { q: "الضغط المنخفض يعني:", a: ["الضغط بالقرب من مرمى فريقنا", "الضغط عند مرمى الخصم", "الهجوم فقط", "بدون دفاع"], c: 0 },
        { q: "اللاعب الذي يساند زميله في الضغط يسمى:", a: ["اللاعب المساند", "اللاعب البعيد", "الحكم", "المهاجم"], c: 0 },
        { q: "عند الضغط يجب على المدافعين:", a: ["ترك المساحات خلفهم", "الحفاظ على التوازن الدفاعي", "التقدم العشوائي", "إيقاف اللعب"], c: 1 },
        { q: "الضغط الناجح يؤدي إلى:", a: ["زيادة فرص التسجيل", "فقدان التركيز", "تقليل الهجوم", "إضاعة الفرص"], c: 0 },

        // --- قسم سرعة اللعب والهجوم (31-80) ---
        { q: "يمكن تعزيز سرعة اللعب من خلال:", a: ["تقليل اللياقة", "رفع مستوى اللياقة البدنية", "تقليل السرعة", "إهمال التكنيك"], c: 1 },
        { q: "من وسائل تحسين سرعة اللعب:", a: ["تطوير التكنيك السريع", "تقليل التدريب", "تقليل اللاعبين", "إهمال الخطط"], c: 0 },
        { q: "مثال الزيادة العددية في التمرين يكون:", a: ["2 ضد 2", "6 ضد 4", "1 ضد 1", "3 ضد 3"], c: 1 },
        { q: "مساحة تمرين الزيادة العددية (6 ضد 4) هي:", a: ["10×10", "20×20", "40×20 متر", "50×50"], c: 2 },
        { q: "من أسس الهجوم في كرة القدم:", a: ["البطء", "الكل في الدفاع والكل في الهجوم", "لاعب واحد", "ترك المساحات"], c: 1 },
        { q: "الانتقال السريع يكون بين:", a: ["الدفاع والهجوم", "الحارس والمدرب", "الجمهور واللاعبين", "الحكم والمهاجم"], c: 0 },
        { q: "من متطلبات اللعب الانسيابي:", a: ["فقدان الكرة", "التمريرات المضبوطة", "اللعب الفردي", "التوقف"], c: 1 },
        { q: "المرحلة الأولى من الهجوم الجماعي تتميز بـ:", a: ["البطء", "السرعة", "الوقوف", "التراجع"], c: 1 },
        { q: "من متطلبات الهجوم الفعال:", a: ["الانفتاح والانتشار", "التراجع", "تقليل المناولات", "اللعب العشوائي"], c: 0 },
        { q: "الهدف بعد الحصول على حيازة الكرة هو:", a: ["إضاعة الوقت", "التهديف الفعال", "التمرير للخلف", "إخراج الكرة"], c: 1 },
        { q: "الهدف من تمرين الزيادة العددية هو:", a: ["تقليل الفرص", "تطوير سرعة اتخاذ القرار", "تقليل الحركة", "إهمال التعاون"], c: 1 },

    let currentIdx = 0;
    let correctCount = 0;
    let wrongCount = 0;

    document.getElementById("total-q-count").innerText = quizData.length;

    function loadQuestion() {
        if (currentIdx >= quizData.length) {
            showResult();
            return;
        }

        const q = quizData[currentIdx];
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("current-idx").innerText = currentIdx + 1;
        
        const container = document.getElementById("options-container");
        container.innerHTML = "";

        q.a.forEach((option, index) => {
            const btn = document.createElement("button");
            btn.classList.add("option");
            btn.innerText = option;
            btn.onclick = () => checkAnswer(index, q.c);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {
        const buttons = document.querySelectorAll(".option");
        buttons.forEach(b => b.disabled = true);

        if (selected === correct) {
            buttons[selected].classList.add("correct");
            correctCount++;
        } else {
            buttons[selected].classList.add("wrong");
            buttons[correct].classList.add("correct");
            wrongCount++;
        }

        document.getElementById("live-score").innerText = correctCount;

        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1000);
    }

    function showResult() {
        document.getElementById("game").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("final-correct").innerText = correctCount;
        document.getElementById("final-wrong").innerText = wrongCount;
        
        const percent = Math.round((correctCount / quizData.length) * 100);
        document.getElementById("final-percent").innerText = percent + "%";
    }

    loadQuestion();
</script>
