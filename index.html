<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار مادة كرة القدم الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --secondary: #2c3e50; --wrong: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-container { background: white; width: 95%; max-width: 700px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--secondary); margin-bottom: 30px; font-size: 22px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: #666; font-weight: bold; background: #eee; padding: 10px; border-radius: 10px; }
        .question { font-size: 20px; margin-bottom: 25px; color: var(--secondary); line-height: 1.6; font-weight: 700; }
        .options { display: grid; gap: 12px; }
        button.option { padding: 15px; border: 2px solid #edeff0; border-radius: 10px; background: white; cursor: pointer; transition: all 0.2s; font-family: 'Tajawal', sans-serif; font-size: 17px; text-align: right; color: #333; }
        button.option:hover:not([disabled]) { background-color: #f8f9fa; border-color: var(--primary); transform: translateY(-2px); }
        button.correct { background-color: var(--primary) !important; color: white; border-color: #219150; }
        button.wrong { background-color: var(--wrong) !important; color: white; border-color: #c0392b; }
        .next-btn { margin-top: 25px; width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; display: none; font-weight: bold; }
        .next-btn:hover { background: #34495e; }
        .result-screen { text-align: center; display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 10px solid var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 30px auto; }
        .score-num { font-size: 40px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <div id="game">
        <h1>ملخص مادة كرة القدم</h1>
        <div class="stats">
            <span id="progress">سؤال 1 من --</span>
            <span id="score-count">النقاط: 0</span>
        </div>
        <div class="question" id="question-text">جاري تحميل الأسئلة...</div>
        <div class="options" id="options-container"></div>
        <button class="next-btn" id="next-button" onclick="nextQuestion()">السؤال التالي ⬅️</button>
    </div>

    <div class="result-screen" id="result">
        <h1>نتيجة الاختبار</h1>
        <div class="score-circle">
            <div class="score-num" id="final-score">0</div>
            <div style="color:#777">من <span id="total-q"></span></div>
        </div>
        <p id="feedback-text" style="font-size: 18px; margin-bottom: 20px;"></p>
        <button class="next-btn" style="display:block" onclick="location.reload()">إعادة المحاولة 🔄</button>
    </div>
</div>

<script>
    // تجميع كافة الأسئلة من جميع الصفحات
    const quizData = [
        // المجموعة الأولى: الدفاع (1-30)
        { q: "من أهم واجبات الدفاع الصحيح الحديث هو:", a: ["زيادة الهجوم فقط", "إيقاف المهاجم الخصم تكاسيفياً بدافعية", "ترك المساحات للمنافس", "اللعب الفردي فقط"], c: 1 },
        { q: "تأخير تصاعد نمو الهجمة للفريق الخصم يعني:", a: ["تسريع هجوم الخصم", "إبطاء تقدم الهجمة المنافسة", "ترك الكرة للمنافس", "عدم الرجوع للدفاع"], c: 1 },
        { q: "السعي للحصول على الوقت للرجوع إلى مناطقنا الدفاعية يهدف إلى:", a: ["زيادة الهجوم", "تنظيم الخط الدفاعي", "تغيير الحارس", "إضاعة الوقت فقط"], c: 1 },
        { q: "تقليل الفراغ والوقت على المنافس على بعد 40 ياردة من الهدف يسمى:", a: ["هجوم مرتد", "ضغط دفاعي", "تمرير جانبي", "لعب حر"], c: 1 },
        { q: "عمل الارتكازات السريعة الخلفية في المناطق خلف دفاعنا يهدف إلى:", a: ["زيادة الأهداف", "حماية العمق الدفاعي", "تبديل اللاعبين", "تنفيذ ركنية"], c: 1 },
        { q: "التغطية الجيدة والمتبادلة والافتضاض المناسب تعني:", a: ["ترك الخصم بحرية", "تعاون دفاعي منظم", "إيقاف اللعب", "اللعب الفردي"], c: 1 },
        { q: "السعي للحصول على الزيادة العددية في الدفاع 2 ضد 1 يسمى:", a: ["هجوم سريع", "تفوق عددي دفاعي", "ضغط هجومي", "استحواذ فقط"], c: 1 },
        { q: "كسب حالة الصراع الفردي 1 ضد 1 لصالح فريقنا يعني:", a: ["ترك اللاعب المنافس", "النجاح في المواجهة الفردية الدفاعية", "لعب هجومي", "إضاعة الوقت"], c: 1 },
        { q: "الضغط على الخصم ومنعه من التمريرات الأمامية يهدف إلى:", a: ["تسهيل هجومه", "منعه من الوصول لمرمانا بسهولة", "إعطاؤه فرصة للتسجيل", "تقليل الاستحواذ فقط"], c: 1 },
        { q: "المراقبة الجيدة لالعب المنافس وقطع الكرة تهدف إلى:", a: ["زيادة الركنيات", "حماية المنطقة الخطيرة المهددة لمرمانا", "زيادة الهجوم", "تنفيذ ضربات حرة"], c: 1 },
        { q: "من أهداف الدفاع الصحيح أيضاً:", a: ["ترك المنافس يتحرك بحرية", "تقليل فرص التسجيل على الفريق الخصم", "عدم العودة للخلف", "الاعتماد على الحارس فقط"], c: 1 },
        { q: "عند الضغط على المنافس يجب:", a: ["منحه الوقت والمساحة", "تقليل الوقت والمساحة المتاحة له", "تركه يمر بسهولة", "الابتعاد عنه تماماً"], c: 1 },
        { q: "التغطية الدفاعية الجيدة تساعد على:", a: ["زيادة الأخطاء الدفاعية", "دعم الزميل المدافع وتقليل الخطورة", "ترك المساحات للمنافس", "إضعاف الدفاع"], c: 1 },
        { q: "الزيادة العددية الدفاعية تعني:", a: ["زيادة عدد المهاجمين", "وجود أكثر من مدافع ضد مهاجم واحد", "خروج المدافعين من أماكنهم", "تقليل عدد اللاعبين"], c: 1 },
        { q: "في الدفاع الحديث يجب التركيز على:", a: ["المهارات الفردية فقط", "التعاون الجماعي والتنظيم الدفاعي", "اللعب العشوائي", "ترك الكرة للمنافس"], c: 1 },
        { q: "الهدف من إبطاء هجمة المنافس هو:", a: ["إعطاؤه فرصة أفضل", "منح الفريق وقتاً للعودة وتنظيم الدفاع", "زيادة سرعة المباراة", "تقليل عدد اللاعبين"], c: 1 },
        { q: "المراقبة الفردية للاعب المنافس تهدف إلى:", a: ["تسهيل تحركاته", "الحد من خطورته ومنعه من الاستلام بحرية", "تركه دون رقابة", "زيادة الاستحواذ"], c: 1 },
        { q: "غلق العمق الدفاعي يعني:", a: ["ترك المساحات خلف الدفاع", "حماية المنطقة القريبة من المرمى", "زيادة الهجوم", "التقدم الكامل للأمام"], c: 1 },
        { q: "المواجهة الفردية الناجحة 1 ضد 1 تؤدي إلى:", a: ["زيادة فرص الخصم", "استعادة الكرة وتقليل الخطورة", "ضعف الدفاع", "إيقاف المباراة"], c: 1 },
        { q: "الدفاع المنظم يعتمد على:", a: ["العشوائية", "التمركز الصحيح والتغطية المستمرة", "اللعب الفردي فقط", "الهجوم فقط"], c: 1 },
        { q: "من واجبات المدافع الأساسية:", a: ["ترك المهاجم دون رقابة", "مراقبة المهاجم ومنعه من التقدم", "الوقوف فقط", "اللعب الهجومي فقط"], c: 1 },
        { q: "الضغط الدفاعي الفعال يؤدي إلى:", a: ["راحة المهاجم", "إجبار المنافس على ارتكاب الأخطاء", "تسهيل التمرير للمنافس", "زيادة خطورة الخصم"], c: 1 },
        { q: "من وسائل الدفاع الجيد:", a: ["الابتعاد عن الكرة", "قطع التمريرات ومراقبة المنافس", "ترك المساحات", "الوقوف دون حركة"], c: 1 },
        { q: "الهدف من التغطية الدفاعية هو:", a: ["ترك الزميل وحده", "مساندة المدافع الأساسي عند الحاجة", "تقليل عدد المدافعين", "إيقاف الهجوم فقط"], c: 1 },
        { q: "عند وجود مهاجم خطير قرب المرمى يجب:", a: ["تركه بحرية", "مراقبته بإحكام وتقليل فرصه", "الابتعاد عنه", "السماح له بالتصويب"], c: 1 },
        { q: "الدفاع الجماعي يعتمد على:", a: ["العمل الفردي فقط", "التعاون بين جميع اللاعبين", "الحارس فقط", "المهاجمين فقط"], c: 1 },
        { q: "منع التمريرات الأمامية للمنافس يساعد في:", a: ["تسريع هجومه", "إبطاء بناء الهجمة الهجومية", "زيادة الأهداف عليه", "ترك المساحات"], c: 1 },
        { q: "من صفات المدافع الجيد:", a: ["البطء وعدم التركيز", "السرعة والتركيز وحسن التمركز", "ترك الخصم بحرية", "اللعب العشوائي"], c: 1 },
        { q: "الدفاع الناجح يبدأ من:", a: ["الحارس فقط", "جميع خطوط الفريق", "المهاجمين فقط", "المدافعين فقط دون الوسط"], c: 1 },
        { q: "الهدف النهائي من الدفاع هو:", a: ["زيادة عدد الركنيات", "حماية المرمى ومنع استقبال الأهداف", "الاحتفاظ بالكرة فقط", "إضاعة الوقت"], c: 1 },

        // مجموعة الضغط (1-30 الجديدة)
        { q: "ما المقصود بالضغط بكرة القدم؟", a: ["التراجع الكامل للدفاع", "محاولة منع الفريق المنافس من حيازة الكرة", "اللعب الفردي فقط", "الاعتماد على الحارس"], c: 1 },
        { q: "من أهداف الضغط:", a: ["إبطاء هجوم الفريق المنافس", "زيادة أخطاء الفريق المدافع", "تقليل عدد اللاعبين", "إضاعة الوقت فقط"], c: 0 },
        { q: "من شروط نجاح الضغط:", a: ["ضعف اللياقة البدنية", "امتلاك عقلية ناجحة للهجوم على اللاعب المنافس", "الاعتماد على لاعب واحد فقط", "الوقوف الثابت"], c: 1 },
        { q: "يستخدم الضغط عندما:", a: ["يرغب فريقنا اللعب بسرعة كبيرة", "يكون الفريق متفوقاً جداً", "لا توجد كرة في الملعب", "عند انتهاء المباراة"], c: 0 },
        { q: "من الملاحظات التدريبية للاعب الضاغط:", a: ["ترك المنافس يتحرك بحرية", "الضغط من مسافة بعيدة", "التحرك على الكرة وتحويلها نحو المرمى", "عدم متابعة الكرة"], c: 2 },
        { q: "عندما يكون المنافس الحائز على الكرة ضعيف السيطرة يجب:", a: ["التراجع فقط", "الضغط واعتراض الكرة", "تركه يمر", "الوقوف دون حركة"], c: 1 },
        { q: "من أنواع الضغط في كرة القدم:", a: ["الضغط الفردي", "الضغط الجماعي", "الضغط في نصف ملعب الخصم", "جميع ما ذكر"], c: 3 },
        { q: "الضغط الجماعي يعني:", a: ["لاعب واحد يضغط", "تعاون أكثر من لاعب لاستعادة الكرة", "الحارس فقط يضغط", "عدم التحرك نهائياً"], c: 1 },
        { q: "من فوائد الضغط الناجح:", a: ["فقدان الكرة بسرعة", "استعادة الكرة في مناطق متقدمة", "تقليل فرص التسجيل", "زيادة أخطاء الفريق نفسه"], c: 1 },
        { q: "الضغط في نصف ملعب الخصم يساعد على:", a: ["إبعاد الفريق عن الهجوم", "منع المنافس من بناء الهجمة", "تقليل عدد اللاعبين", "إنهاء المباراة بسرعة"], c: 1 },
        { q: "العامل الأساسي في تنفيذ الضغط هو:", a: ["البطء في الحركة", "السرعة والتوقيت المناسب", "الوقوف فقط", "الاعتماد على الحظ"], c: 1 },
        { q: "إذا نجح الضغط فإن الفريق يستطيع:", a: ["خسارة المباراة", "السيطرة على مجريات اللعب", "تقليل فرص الهجوم", "زيادة الأخطاء الدفاعية"], c: 1 },
        { q: "من أخطاء الضغط:", a: ["التأخر في الانقضاض", "الاقتراب السريع", "التعاون بين اللاعبين", "التغطية الدفاعية"], c: 0 },
        { q: "اللاعب الضاغط يجب أن يكون:", a: ["بطيئاً", "متردداً", "شجاعاً وسريع القرار", "بعيداً عن المنافس"], c: 2 },
        { q: "الهدف الرئيسي من الضغط هو:", a: ["استرجاع الكرة بسرعة", "إضاعة الوقت فقط", "زيادة عدد اللاعبين", "تغيير الحكم"], c: 0 },
        { q: "الضغط الناجح يتطلب:", a: ["التنسيق بين اللاعبين", "اللعب العشوائي", "الوقوف بدون حركة", "الاعتماد على لاعب واحد فقط"], c: 0 },
        { q: "عند الضغط على حامل الكرة يجب:", a: ["منحه مساحة كبيرة", "غلق زوايا التمرير عليه", "الابتعاد عنه", "انتظار خطأ الحكم"], c: 1 },
        { q: "الضغط المبكر يساعد على:", a: ["بناء هجمة للمنافس", "تقليل خطورة المنافس", "ضعف الدفاع", "زيادة المساحات"], c: 1 },
        { q: "من صفات الفريق الجيد في الضغط:", a: ["البطء والتردد", "التنظيم والانضباط", "الفوضى داخل الملعب", "الاعتماد على الصدفة"], c: 1 },
        { q: "الضغط بعد فقدان الكرة يسمى:", a: ["الضغط العكسي", "الدفاع السلبي", "اللعب الفردي", "التراجع النهائي"], c: 0 },
        { q: "من فوائد الضغط العكسي:", a: ["استعادة الكرة بسرعة بعد فقدانها", "إيقاف المباراة", "تقليل عدد اللاعبين", "إراحة الفريق المنافس"], c: 0 },
        { q: "عند فشل الضغط الأول يجب:", a: ["الاستسلام", "وجود تغطية من الزملاء", "ترك المنافس يسجل", "التوقف عن اللعب"], c: 1 },
        { q: "الضغط الفعال يبدأ من:", a: ["التنظيم الجماعي للفريق", "الحارس فقط", "المدرب خارج الملعب", "الجمهور"], c: 0 },
        { q: "من عناصر نجاح الضغط:", a: ["التواصل بين اللاعبين", "اللعب الفردي فقط", "البطء في التحرك", "ترك المساحات"], c: 0 },
        { q: "الضغط العالي يعني:", a: ["الضغط بالقرب من مرمى المنافس", "الضغط داخل منطقة الجزاء فقط", "التراجع إلى الخلف", "عدم التحرك"], c: 0 },
        { q: "الضغط المتوسط يكون غالباً في:", a: ["وسط الملعب", "داخل مرمى الفريق", "خارج الملعب", "عند خط التماس فقط"], c: 0 },
        { q: "الضغط المنخفض يعني:", a: ["الضغط بالقرب من مرمى الفريق (فريقنا)", "الضغط عند مرمى الخصم", "الهجوم فقط", "اللعب دون دفاع"], c: 0 },
        { q: "اللاعب الذي يساند زميله في الضغط يسمى:", a: ["اللاعب المساند", "اللاعب البعيد", "الحكم", "المهاجم فقط"], c: 0 },
        { q: "عند الضغط يجب على المدافعين:", a: ["ترك المساحات خلفهم", "الحفاظ على التوازن الدفاعي", "التقدم العشوائي", "إيقاف اللعب"], c: 1 },
        { q: "الضغط الناجح يؤدي إلى:", a: ["زيادة فرص التسجيل", "فقدان التركيز", "تقليل الهجوم", "إضاعة الفرص فقط"], c: 0 },

        // مجموعة سرعة اللعب والهجوم (31-80)
        { q: "يمكن تعزيز سرعة اللعب من خلال:", a: ["تقليل اللياقة", "رفع مستوى اللياقة البدنية", "تقليل سرعة اللاعبين", "إهمال التكنيك"], c: 1 },
        { q: "من وسائل تحسين سرعة اللعب:", a: ["تطوير التكنيك السريع", "تقليل التدريب", "تقليل عدد اللاعبين", "إهمال الخطط"], c: 0 },
        { q: "مثال الزيادة العددية في التمرين يكون غالباً:", a: ["2 ضد 2", "6 ضد 4", "1 ضد 1", "3 ضد 3"], c: 1 },
        { q: "مساحة تمرين الزيادة العددية المذكورة هي:", a: ["10 × 10 متر", "20 × 20 متر", "40 × 20 متر", "50 × 50 متر"], c: 2 },
        { q: "من أسس الهجوم في كرة القدم:", a: ["البطء في الانتقال", "الكل في الدفاع والكل في الهجوم", "الاعتماد على لاعب واحد", "ترك المساحات"], c: 1 },
        { q: "الانتقال السريع يكون بين:", a: ["الدفاع والهجوم", "الحارس والمدرب", "الجمهور واللاعبين", "الحكم والمهاجم"], c: 0 },
        { q: "من متطلبات اللعب الانسيابي:", a: ["فقدان الكرة بسرعة", "التمريرات المضبوطة", "اللعب الفردي فقط", "التوقف المستمر"], c: 1 },
        { q: "المرحلة الأولى من الهجوم الجماعي تتميز بـ:", a: ["البطء الشديد", "السرعة", "الوقوف الثابت", "التراجع للخلف"], c: 1 },
        { q: "من متطلبات الهجوم الفعال:", a: ["الانفتاح والانتشار", "التراجع المستمر", "تقليل المناولات", "اللعب العشوائي"], c: 0 },

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const q = quizData[currentQ];
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("progress").innerText = `سؤال ${currentQ + 1} من ${quizData.length}`;
        document.getElementById("total-q").innerText = quizData.length;
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        document.getElementById("next-button").style.display = "none";

        q.a.forEach((option, index) => {
            const btn = document.createElement("button");
            btn.classList.add("option");
            btn.innerText = option;
            btn.onclick = () => checkAnswer(index, q.c);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {
        const buttons = document.querySelectorAll(".option");
        if (selected === correct) {
            buttons[selected].classList.add("correct");
            score++;
        } else {
            buttons[selected].classList.add("wrong");
            buttons[correct].classList.add("correct");
        }
        buttons.forEach(btn => btn.disabled = true);
        document.getElementById("next-button").style.display = "block";
        document.getElementById("score-count").innerText = `النقاط: ${score}`;
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById("game").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("final-score").innerText = score;
        
        const percent = (score / quizData.length) * 100;
        let feedback = "";
        if(percent >= 90) feedback = "أداء ممتاز! أنت خبير في تكتيكات كرة القدم.";
        else if(percent >= 70) feedback = "أداء جيد جداً! لديك معرفة قوية بالقواعد.";
        else if(percent >= 50) feedback = "أداء متوسط. تحتاج لمراجعة بعض المفاهيم.";
        else feedback = "تحتاج للمزيد من الدراسة والمراجعة لهذا الملخص.";
        
        document.getElementById("feedback-text").innerText = feedback;
    }

    loadQuestion();
</script>
