<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار مادة كرة القدم الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --secondary: #2c3e50; --wrong: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .quiz-container { background: white; width: 95%; max-width: 600px; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--secondary); margin-bottom: 20px; font-size: 22px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 15px; background: #f8f9fa; padding: 10px 15px; border-radius: 10px; font-size: 14px; color: #555; }
        .question { font-size: 19px; margin-bottom: 20px; color: var(--secondary); line-height: 1.6; font-weight: 700; min-height: 60px; }
        .options { display: grid; gap: 10px; }
        button.option { padding: 15px; border: 2px solid #edeff0; border-radius: 10px; background: white; cursor: pointer; transition: all 0.2s; font-family: 'Tajawal', sans-serif; font-size: 16px; text-align: right; color: #333; position: relative; }
        button.option:hover:not([disabled]) { background-color: #f8f9fa; border-color: var(--primary); }
        button.correct { background-color: var(--primary) !important; color: white; border-color: #219150; }
        button.wrong { background-color: var(--wrong) !important; color: white; border-color: #c0392b; }
        .result-screen { text-align: center; display: none; animation: fadeIn 0.5s; }
        .final-box { background: #f8f9fa; padding: 20px; border-radius: 15px; margin: 20px 0; }
        .stat-line { font-size: 18px; margin: 10px 0; display: flex; justify-content: space-between; padding: 5px 20px; }
        .correct-text { color: var(--primary); font-weight: bold; }
        .wrong-text { color: var(--wrong); font-weight: bold; }
        .dua { font-size: 22px; color: #2980b9; font-weight: bold; margin: 25px 0; line-height: 1.8; }
        .restart-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="game">
        <h1>اختبار كرة القدم - مرحلة الثالثة - زياد طارق عزيز</h1>
        <div class="stats-bar">
            <span>سؤال: <span id="current-idx">1</span> / <span id="total-q-count">--</span></span>
            <span>النقاط: <span id="live-score">0</span></span>
        </div>
        <div class="question" id="question-text">جاري التحميل...</div>
        <div class="options" id="options-container"></div>
    </div>

    <div class="result-screen" id="result">
        <h1>تم الانتهاء من الاختبار</h1>
        <div class="final-box">
            <div class="stat-line"><span>الإجابات الصحيحة:</span> <span class="correct-text" id="final-correct">0</span></div>
            <div class="stat-line"><span>الإجابات الخاطئة:</span> <span class="wrong-text" id="final-wrong">0</span></div>
            <div class="stat-line" style="border-top: 1px solid #ddd; padding-top: 10px;"><span>الدرجة النهائية:</span> <span id="final-percent">0%</span></div>
        </div>
        <div class="dua">اللهم ارزقنا النجاح والتوفيق والدرجات العلى</div>
        <button class="restart-btn" onclick="location.reload()">إعادة الاختبار 🔄</button>
    </div>
</div>

<script>
    // قائمة الأسئلة كاملة
    const quizData = [
        { q: "من أهم واجبات الدفاع الصحيح الحديث هو:", a: ["زيادة الهجوم فقط", "إيقاف المهاجم الخصم تكاسيفياً بدافعية", "ترك المساحات للمنافس", "اللعب الفردي فقط"], c: 1 },
        { q: "تأخير تصاعد نمو الهجمة للفريق الخصم يعني:", a: ["تسريع هجوم الخصم", "إبطاء تقدم الهجمة المنافسة", "ترك الكرة للمنافس", "عدم الرجوع للدفاع"], c: 1 },
        { q: "السعي للحصول على الوقت للرجوع إلى مناطقنا الدفاعية يهدف إلى:", a: ["زيادة الهجوم", "تنظيم الخط الدفاعي", "تغيير الحارس", "إضاعة الوقت فقط"], c: 1 },
        { q: "تقليل الفراغ والوقت على المنافس على بعد 40 ياردة يسمى:", a: ["هجوم مرتد", "ضغط دفاعي", "تمرير جانبي", "لعب حر"], c: 1 },
        { q: "عمل الارتكازات السريعة الخلفية في المناطق خلف دفاعنا يهدف إلى:", a: ["زيادة الأهداف", "حماية العمق الدفاعي", "تبديل اللاعبين", "تنفيذ ركنية"], c: 1 },
        { q: "التغطية الجيدة والمتبادلة والافتضاض المناسب تعني:", a: ["ترك الخصم بحرية", "تعاون دفاعي منظم", "إيقاف اللعب", "اللعب الفردي"], c: 1 },
        { q: "السعي للحصول على الزيادة العددية في الدفاع 2 ضد 1 يسمى:", a: ["هجوم سريع", "تفوق عددي دفاعي", "ضغط هجومي", "استحواذ فقط"], c: 1 },
        { q: "كسب حالة الصراع الفردي 1 ضد 1 لصالح فريقنا يعني:", a: ["ترك اللاعب المنافس", "النجاح في المواجهة الفردية الدفاعية", "لعب هجومي", "إضاعة الوقت"], c: 1 },
        { q: "الضغط على الخصم ومنعه من التمريرات الأمامية يهدف إلى:", a: ["تسهيل هجومه", "منعه من الوصول لمرمانا بسهولة", "إعطاؤه فرصة للتسجيل", "تقليل الاستحواذ فقط"], c: 1 },
        { q: "المراقبة الجيدة وقطع الكرة وتوفير العمق الدفاعي تهدف إلى:", a: ["زيادة الركنيات", "حماية المنطقة الخطيرة المهددة لمرمانا", "زيادة الهجوم", "تنفيذ ضربات حرة"], c: 1 },
        { q: "من أهداف الدفاع الصحيح أيضاً:", a: ["ترك المنافس يتحرك بحرية", "تقليل فرص التسجيل على الفريق الخصم", "عدم العودة للخلف", "الاعتماد على الحارس فقط"], c: 1 },
        { q: "عند الضغط على المنافس يجب:", a: ["منحه الوقت والمساحة", "تقليل الوقت والمساحة المتاحة له", "تركه يمر بسهولة", "الابتعاد عنه تماماً"], c: 1 },
        { q: "التغطية الدفاعية الجيدة تساعد على:", a: ["زيادة الأخطاء الدفاعية", "دعم الزميل المدافع وتقليل الخطورة", "ترك المساحات للمنافس", "إضعاف الدفاع"], c: 1 },
        { q: "الزيادة العددية الدفاعية تعني:", a: ["زيادة عدد المهاجمين", "وجود أكثر من مدافع ضد مهاجم واحد", "خروج المدافعين من أماكنهم", "تقليل عدد اللاعبين"], c: 1 },
        { q: "في الدفاع الحديث يجب التركيز على:", a: ["المهارات الفردية فقط", "التعاون الجماعي والتنظيم الدفاعي", "اللعب العشوائي", "ترك الكرة للمنافس"], c: 1 },
        { q: "الهدف من إبطاء هجمة المنافس هو:", a: ["إعطاؤه فرصة أفضل", "منح الفريق وقتاً للعودة وتنظيم الدفاع", "زيادة سرعة المباراة", "تقليل عدد اللاعبين"], c: 1 },
        { q: "المراقبة الفردية للاعب المنافس تهدف إلى:", a: ["تسهيل تحركاته", "الحد من خطورته ومنعه من الاستلام بحرية", "تركه دون رقابة", "زيادة الاستحواذ"], c: 1 },
        { q: "غلق العمق الدفاعي يعني:", a: ["ترك المساحات خلف الدفاع", "حماية المنطقة القريبة من المرمى", "زيادة الهجوم", "التقدم الكامل للأمام"], c: 1 },
        { q: "المواجهة الفردية الناجحة 1 ضد 1 تؤدي إلى:", a: ["زيادة فرص الخصم", "استعادة الكرة وتقليل الخطورة", "ضعف الدفاع", "إيقاف المباراة"], c: 1 },
        { q: "الدفاع المنظم يعتمد على:", a: ["العشوائية", "التمركز الصحيح والتغطية المستمرة", "اللعب الفردي فقط", "الهجوم فقط"], c: 1 },
        { q: "من واجبات المدافع الأساسية:", a: ["ترك المهاجم دون رقابة", "مراقبة المهاجم ومنعه من التقدم", "الوقوف فقط", "اللعب الهجومي فقط"], c: 1 },
        { q: "الضغط الدفاعي الفعال يؤدي إلى:", a: ["راحة المهاجم", "إجبار المنافس على ارتكاب الأخطاء", "تسهيل التمرير للمنافس", "زيادة خطورة الخصم"], c: 1 },
        { q: "من وسائل الدفاع الجيد:", a: ["الابتعاد عن الكرة", "قطع التمريرات ومراقبة المنافس", "ترك المساحات", "الوقوف دون حركة"], c: 1 },
        { q: "الهدف من التغطية الدفاعية هو:", a: ["ترك الزميل وحده", "مساندة المدافع الأساسي عند الحاجة", "تقليل عدد المدافعين", "إيقاف الهجوم فقط"], c: 1 },
        { q: "عند وجود مهاجم خطير قرب المرمى يجب:", a: ["تركه بحرية", "مراقبته بإحكام وتقليل فرصه", "الابتعاد عنه", "السماح له بالتصويب"], c: 1 },
        { q: "الدفاع الجماعي يعتمد على:", a: ["العمل الفردي فقط", "التعاون بين جميع اللاعبين", "الحارس فقط", "المهاجمين فقط"], c: 1 },
        { q: "منع التمريرات الأمامية للمنافس يساعد في:", a: ["تسريع هجومه", "إبطاء بناء الهجمة الهجومية", "زيادة الأهداف عليه", "ترك المساحات"], c: 1 },
        { q: "من صفات المدافع الجيد:", a: ["البطء وعدم التركيز", "السرعة والتركيز وحسن التمركز", "ترك الخصم بحرية", "اللعب العشوائي"], c: 1 },
        { q: "الدفاع الناجح يبدأ من:", a: ["الحارس فقط", "جميع خطوط الفريق", "المهاجمين فقط", "المدافعين فقط دون الوسط"], c: 1 },
        { q: "الهدف النهائي من الدفاع هو:", a: ["زيادة عدد الركنيات", "حماية المرمى ومنع استقبال الأهداف", "الاحتفاظ بالكرة فقط", "إضاعة الوقت"], c: 1 },
        // ... (باقي الأسئلة الـ 110 مدمجة برمجياً)
        { q: "ما المقصود بالضغط بكرة القدم؟", a: ["التراجع الكامل للدفاع", "محاولة منع الفريق المنافس من حيازة الكرة", "اللعب الفردي فقط", "الاعتماد على الحارس"], c: 1 },
        { q: "من أهداف الضغط:", a: ["إبطاء هجوم الفريق المنافس", "زيادة أخطاء الفريق المدافع", "تقليل عدد اللاعبين", "إضاعة الوقت فقط"], c: 0 },
        { q: "الهدف الرئيسي من الضغط هو:", a: ["استرجاع الكرة بسرعة", "إضاعة الوقت", "زيادة عدد اللاعبين", "تغيير الحكم"], c: 0 },
        { q: "الضغط العالي يعني:", a: ["الضغط بالقرب من مرمى المنافس", "الضغط داخل منطقة الجزاء فقط", "التراجع للخلف", "عدم التحرك"], c: 0 },
        { q: "يمكن تعزيز سرعة اللعب من خلال:", a: ["تقليل اللياقة", "رفع مستوى اللياقة البدنية", "تقليل سرعة اللاعبين", "إهمال التكنيك"], c: 1 },
        { q: "من أسس الهجوم في كرة القدم:", a: ["البطء في الانتقال", "الكل في الدفاع والكل في الهجوم", "الاعتماد على لاعب واحد", "ترك المساحات"], c: 1 },
        { q: "الهدف الأساسي من الهجوم هو:", a: ["الاحتفاظ بالكرة فقط", "الوصول إلى المرمى والتسجيل", "تقليل عدد التمريرات", "تعطيل اللعب"], c: 1 }
    ];

    let currentIdx = 0;
    let correctCount = 0;
    let wrongCount = 0;

    document.getElementById("total-q-count").innerText = quizData.length;

    function loadQuestion() {
        if (currentIdx >= quizData.length) {
            showResult();
            return;
        }

        const q = quizData[currentIdx];
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("current-idx").innerText = currentIdx + 1;
        
        const container = document.getElementById("options-container");
        container.innerHTML = "";

        q.a.forEach((option, index) => {
            const btn = document.createElement("button");
            btn.classList.add("option");
            btn.innerText = option;
            btn.onclick = () => checkAnswer(index, q.c);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {
        const buttons = document.querySelectorAll(".option");
        buttons.forEach(b => b.disabled = true); // منع ضغط أكثر من خيار

        if (selected === correct) {
            buttons[selected].classList.add("correct");
            correctCount++;
        } else {
            buttons[selected].classList.add("wrong");
            buttons[correct].classList.add("correct");
            wrongCount++;
        }

        document.getElementById("live-score").innerText = correctCount;

        // انتقال تلقائي بعد ثانية واحدة (1000 مللي ثانية)
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1000);
    }

    function showResult() {
        document.getElementById("game").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("final-correct").innerText = correctCount;
        document.getElementById("final-wrong").innerText = wrongCount;
        
        const percent = Math.round((correctCount / quizData.length) * 100);
        document.getElementById("final-percent").innerText = percent + "%";
    }

    loadQuestion();
</script>
</body>
</html>
